<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Legal Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1024px; height: 1536px; overflow: hidden; background: transparent; }
    .card { position: relative; width: 1024px; height: 1536px; overflow: hidden; }
    .card__bg { position: absolute; top: 0; left: 0; width: 1024px; height: 1536px; display: block; z-index: 0; }
    .overlay { position: absolute; z-index: 10; pointer-events: none; }

    /* DATE BAND — rows 274–342 */
    .overlay--date {
      top: 274px; left: 0; width: 1024px; height: 68px;
      display: flex; align-items: center; justify-content: center;
    }
    .date-text {
      font-family: 'Cinzel', serif; font-size: 26px; font-weight: 600;
      color: #1a2060; letter-spacing: 0.18em; text-transform: uppercase; white-space: nowrap;
    }

    /* CONTENT AREA — rows 900–1122 */
    .overlay--content {
      top: 885px; left: 80px; right: 80px;
      height: 290px; overflow: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding-top: 30px;
    }

    /* Headline — EB Garamond bold */
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px; font-weight: 520;
      color: #0d1830; text-align: center;
      line-height: 1.25;
      max-height: 160px; overflow: hidden;
      word-break: break-word; hyphens: auto;
      margin-bottom: 40px;
      flex-shrink: 0; width: 100%;
    }

    /* Case name — Cormorant Garamond 520, matching headline font */
    .case-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 520;
      color: #1a2255; text-align: center;
      letter-spacing: 0.08em; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100%; flex-shrink: 0;
      margin-bottom: 4px;
    }

    /* Citation — same font as case name */
    .case-citation {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 520;
      color: #1a2255; text-align: center;
      letter-spacing: 0.08em; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100%; flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="card">
  <img class="card__bg" src="{{ bg_src }}" alt="" aria-hidden="true"/>

  <div class="overlay overlay--date">
    <span class="date-text">{{ current_date }}</span>
  </div>

  <div class="overlay overlay--content">
    <div class="headline">{{ headline }}</div>
    <div class="case-name">{{ case_name }};</div>
    <div class="case-citation">{{ case_citation }};&nbsp;&nbsp;&nbsp;{{ case_date }}</div>
  </div>
</div>
</body>
</html>
